[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.14
    ESP8266WiFi
monitor_speed = 115200
build_flags =
    -D ARDUINO_ESP8266_NODEMCU

[env:native_test]
platform = native
build_flags =
    -std=c++17
lib_deps =
    https://github.com/emil-e/rapidcheck.git
